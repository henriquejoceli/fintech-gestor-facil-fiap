<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Fácil - Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"> </head>
<body>
    <div class="container-fluid d-flex flex-column min-vh-100 p-0 position-relative">
        
        <header class="header-login text-dark p-5 text-center">
            <h1 class="display-6 fw-bold">Gestor Fácil</h1>
            <p class="lead">Fácil para você, inteligente para o seu bolso.</p>
        </header>

        <div class="wave-cutter"></div>

        <main class="flex-grow-1 p-4 bg-white">
            
            <div class="text-center mb-4">
                <h2 class="h2 fw-bold" style="font-size: 2.5rem;">Login</h2>
            </div>
            
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6" style="max-width: 500px;">
                    
                    <form>
                        <div class="mb-3">
                            <label for="inputEmail" class="form-label visually-hidden">E-mail</label>
                            <input type="email" class="form-control" id="inputEmail" placeholder="E-mail de cadastro">
                        </div>
                        
                        <div class="mb-3">
                            <label for="inputSenha" class="form-label visually-hidden">Senha</label>
                            <input type="password" class="form-control" id="inputSenha" placeholder="Senha">
                        </div>
                        
                        <div class="d-flex flex-column mb-4 small">
                            <a href="#" class="text-decoration-none text-dark mb-1 text-center">Esqueci minha senha</a>
                            <a href="#" class="text-decoration-none text-dark text-center">Alterar minha senha atual</a>
                        </div>
                        
                        <button type="submit" class="btn btn-dark w-100 mb-3">Entrar</button>
                        
                        <p class="text-center text-muted small mb-3">Ou continue com</p>
                        
                        <div class="d-grid gap-2 mb-4">
                            <button class="btn btn-outline-secondary d-flex align-items-center justify-content-center">
                                <i class="fab fa-google me-2"></i> Google
                            </button>
                            <button class="btn btn-outline-secondary d-flex align-items-center justify-content-center">
                                <i class="fab fa-facebook me-2"></i> Facebook
                            </button>
                        </div>

                        <p class="text-center small">
                            Ainda não tem conta? <a href="#" class="text-decoration-none" style="color: #0d6efd; font-weight: bold;">Crie uma agora</a>
                        </p>
                    </form>
                    
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1ySgR4zY6B0yvXlF" crossorigin="anonymous"></script>
</body>
</html>
