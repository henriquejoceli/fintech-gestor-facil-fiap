# ===================================================================
# CONFIGURAÇÃO BANCO EM MEMÓRIA (H2)
# ===================================================================
spring.application.name=fintech

# Configuração da URL e credenciais do H2
spring.datasource.url=jdbc:h2:mem:velofydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Garante que o Hibernate crie as tabelas limpas a cada boot
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=true

# Força a execução do data.sql
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

